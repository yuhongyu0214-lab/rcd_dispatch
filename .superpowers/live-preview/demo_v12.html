<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RCD Dispatch demo_v12</title>
<style>
:root {
  color-scheme: light;
  --bg: oklch(0.945 0.006 235);
  --panel: oklch(0.905 0.012 235);
  --surface: oklch(0.985 0.003 235);
  --map: oklch(0.875 0.018 230);
  --bg-deep: oklch(0.235 0.032 240);
  --bg-elevated: oklch(0.330 0.045 240);
  --line: oklch(0.810 0.010 235);
  --muted-line: oklch(0.790 0.012 235);
  --surface-glass: color-mix(in srgb, var(--surface) 86%, transparent);
  --surface-glass-hover: color-mix(in srgb, var(--surface) 94%, var(--accent) 6%);
  --border-glass: color-mix(in srgb, var(--line) 86%, transparent);
  --accent: oklch(0.635 0.115 35);
  --accent-ink: oklch(0.220 0.025 240);
  --primary: oklch(0.635 0.115 35);
  --primary-glow: color-mix(in srgb, oklch(0.635 0.115 35) 26%, transparent);
  --accent-cyan: oklch(0.620 0.090 220);
  --success: oklch(0.590 0.115 160);
  --warning: oklch(0.690 0.125 76);
  --danger: oklch(0.610 0.160 27);
  --info: oklch(0.620 0.090 220);
  --ink: oklch(0.220 0.025 240);
  --body-muted: oklch(0.420 0.030 240);
  --text-primary: oklch(0.220 0.025 240);
  --text-secondary: oklch(0.420 0.030 240);
  --text-tertiary: oklch(0.560 0.020 240);
  --nav: oklch(0.235 0.032 240);
  --nav-active: oklch(0.330 0.045 240);
  --on-nav: oklch(0.955 0.006 235);
  --road: color-mix(in srgb, var(--ink) 11%, transparent);
  --shadow-card: 0 6px 8px rgba(31, 35, 39, 0.08);
  --shadow-modal: 0 18px 46px rgba(31, 35, 39, 0.18);
  --glow-idle: 0 0 0 4px color-mix(in srgb, var(--success) 18%, transparent);
  --glow-busy: 0 0 0 4px color-mix(in srgb, var(--warning) 18%, transparent);
  --glow-warn: 0 0 0 4px color-mix(in srgb, var(--danger) 18%, transparent);
  --glow-exec: 0 0 0 4px color-mix(in srgb, var(--accent) 20%, transparent);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --rail-w: 72px;
  --work-panel-w: 420px;
  --list-content-w: 408px;
  --list-scrollbar-w: 12px;
  --design-w: 1488px;
  --design-h: 1000px;
  --app-scale: 1;
  --right-panel-min-w: 996px;
  --panel-head-h: 396px;
  --kpi-h: 60px;
  --tab-h: 36px;
  --control-h: 38px;
  --right-head-h: 84px;
  --map-dock-h: 236px;
  --detail-card-h: 208px;
  --recommend-card-h: 208px;
  --card-action-h: 32px;
  --tap-target: 44px;
  --font-system: -apple-system, "SF Pro Display", "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif;
  --font-mono: "SF Mono", "Space Mono", Consolas, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; width: 100%; height: 100%; }
body {
  overflow: hidden;
  background: var(--bg);
  color: var(--text-primary);
  font-family: var(--font-system);
  font-size: 15px;
  font-variant-numeric: tabular-nums;
  -webkit-font-smoothing: antialiased;
}
button, input, select { font: inherit; }
button { border: 0; cursor: pointer; }
button, select, input { touch-action: manipulation; }
svg { display: block; }

.viewport-frame {
  position: fixed;
  inset: 0;
  display: grid;
  width: 100vw;
  height: 100dvh;
  max-width: 100vw;
  max-height: 100dvh;
  place-items: center;
  overflow: hidden;
  background: var(--bg);
}

.app {
  display: grid;
  grid-template-columns: var(--rail-w) var(--work-panel-w) minmax(0, 1fr);
  width: var(--design-w);
  min-width: var(--design-w);
  height: var(--design-h);
  min-height: var(--design-h);
  overflow: hidden;
  background: var(--bg);
  transform: scale(var(--app-scale));
  transform-origin: center center;
  will-change: transform;
  contain: layout paint;
}

.app > *,
.work-panel *,
.map-screen * {
  min-width: 0;
}

.rail {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 16px 10px;
  width: var(--rail-w);
  background: var(--nav);
  color: var(--on-nav);
  box-shadow: 2px 0 20px rgba(31, 35, 39, 0.18);
  z-index: 20;
}
.logo {
  display: grid;
  width: 42px;
  height: 42px;
  place-items: center;
  margin-bottom: 18px;
  border-radius: 999px;
  background: var(--on-nav);
  color: var(--nav);
  font-size: 12px;
  font-weight: 800;
}
.nav-item {
  position: relative;
  display: grid;
  width: 48px;
  height: 48px;
  min-width: 48px;
  min-height: 48px;
  place-items: center;
  border: 1px solid transparent;
  border-radius: 999px;
  background: transparent;
  color: color-mix(in srgb, var(--on-nav) 62%, transparent);
  transition: background 180ms ease, color 180ms ease, transform 80ms ease;
}
.nav-item:hover { background: color-mix(in srgb, var(--on-nav) 10%, transparent); color: var(--on-nav); }
.nav-item:active { transform: scale(0.96); }
.nav-item.active { background: var(--nav-active); color: var(--on-nav); border-color: color-mix(in srgb, var(--on-nav) 13%, transparent); }
.nav-item.warning::after {
  content: "";
  position: absolute;
  right: 7px;
  top: 8px;
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: var(--danger);
  box-shadow: var(--glow-warn);
}
.rail-divider {
  width: 32px;
  height: 1px;
  margin: 8px 0;
  background: color-mix(in srgb, var(--on-nav) 14%, transparent);
}
.rail-state {
  width: 10px;
  height: 10px;
  margin-top: auto;
  border-radius: 999px;
  background: var(--success);
  box-shadow: var(--glow-idle);
}

.work-panel {
  display: flex;
  min-width: 0;
  height: var(--design-h);
  max-height: var(--design-h);
  overflow: hidden;
  flex-direction: column;
  border-right: 1px solid var(--line);
  background: var(--panel);
}
.panel-head {
  flex: 0 0 var(--panel-head-h);
  min-height: var(--panel-head-h);
  max-height: var(--panel-head-h);
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--line);
  overflow: hidden;
}
.eyeline {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  color: var(--text-secondary);
  font-size: 12px;
}
.sync-pill {
  display: inline-flex;
  height: 26px;
  align-items: center;
  gap: 7px;
  border: 1px solid color-mix(in srgb, var(--success) 28%, var(--line));
  border-radius: 999px;
  padding: 0 10px;
  background: color-mix(in srgb, var(--success) 9%, var(--surface));
  color: color-mix(in srgb, var(--success) 72%, var(--ink));
  font-size: 12px;
  font-weight: 700;
}
.sync-pill::before {
  content: "";
  width: 7px;
  height: 7px;
  border-radius: 999px;
  background: var(--success);
}
.panel-title {
  margin: 12px 0 0;
  height: 30px;
  overflow: hidden;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 0;
}
.panel-subtitle {
  margin: 6px 0 0;
  height: 42px;
  overflow: hidden;
  color: var(--text-secondary);
  line-height: 1.45;
}
.kpi-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  height: var(--kpi-h);
  margin-top: 15px;
}
.kpi {
  min-width: 0;
  height: var(--kpi-h);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface);
  padding: 10px;
}
.kpi span { display: block; color: var(--text-secondary); font-size: 12px; }
.kpi strong { display: block; margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: var(--font-mono); font-size: 20px; }
.tabs {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  height: var(--tab-h);
  margin-top: 14px;
}
.tab {
  height: var(--tab-h);
  min-height: var(--tab-h);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: color-mix(in srgb, var(--surface) 72%, var(--panel));
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 700;
  transition: background 160ms ease, color 160ms ease, border-color 160ms ease;
}
.tab.active {
  border-color: color-mix(in srgb, var(--accent) 42%, var(--line));
  background: color-mix(in srgb, var(--accent) 10%, var(--surface));
  color: var(--ink);
}
.control-grid {
  display: grid;
  grid-template-columns: 1fr 122px;
  gap: 8px;
  height: var(--control-h);
  margin-top: 12px;
}
.search {
  height: var(--control-h);
  min-width: 0;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface);
  padding: 0 12px;
  color: var(--text-primary);
  outline: none;
}
.search:focus,
.select:focus {
  border-color: color-mix(in srgb, var(--accent) 52%, var(--line));
  box-shadow: var(--glow-exec);
}
.select {
  height: var(--control-h);
  min-width: 0;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text-primary);
  padding: 0 9px;
  outline: none;
}
.seg-row {
  display: grid;
  gap: 8px;
  margin-top: 10px;
}
.filter-row {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  height: 62px;
  margin-top: 10px;
}
.filter-field {
  display: grid;
  grid-template-rows: 16px var(--control-h);
  gap: 6px;
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 700;
}
.filter-field .select {
  width: 100%;
  font-weight: 700;
}
.seg-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: var(--text-secondary);
  font-size: 12px;
}
.segmented {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.segmented button {
  height: 32px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 700;
}
.segmented button.active {
  border-color: color-mix(in srgb, var(--accent) 46%, var(--line));
  background: color-mix(in srgb, var(--accent) 12%, var(--surface));
  color: var(--ink);
}
.panel-body {
  display: grid;
  grid-template-rows: minmax(0, 1fr) 48px;
  gap: 0;
  min-height: 0;
  overflow: hidden;
  padding: 14px 0 0 0;
}
.list-scroll {
  width: var(--work-panel-w);
  min-height: 0;
  overflow-y: scroll;
  overflow-x: hidden;
  padding: 0 var(--list-scrollbar-w) 10px 0;
  scrollbar-gutter: stable;
}
.list-scroll::-webkit-scrollbar {
  width: var(--list-scrollbar-w);
}
.list-scroll::-webkit-scrollbar-track {
  background: color-mix(in srgb, var(--panel) 74%, var(--surface));
}
.list-scroll::-webkit-scrollbar-thumb {
  border: 3px solid color-mix(in srgb, var(--panel) 74%, var(--surface));
  border-radius: 999px;
  background: color-mix(in srgb, var(--ink) 28%, transparent);
}
.section-stack {
  display: grid;
  width: var(--list-content-w);
  gap: 10px;
  padding-left: 14px;
}
.ingest-card,
.order-card,
.driver-card,
.vehicle-card,
.alert-card,
.log-card,
.detail-card,
.recommend-card {
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  background: var(--surface);
  box-shadow: none;
}
.ingest-card { padding: 12px; }
.ingest-card {
  min-height: 108px;
  overflow: hidden;
}
.ingest-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.mini-title { font-size: 13px; font-weight: 800; }
.mini-sub { margin-top: 3px; color: var(--text-secondary); font-size: 12px; line-height: 1.4; }
.api-code {
  display: inline-flex;
  height: 24px;
  align-items: center;
  border-radius: 999px;
  background: color-mix(in srgb, var(--ink) 7%, var(--surface));
  padding: 0 9px;
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 11px;
}
.field-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 10px;
}
.field {
  min-width: 0;
  min-height: 52px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: color-mix(in srgb, var(--panel) 42%, var(--surface));
  padding: 8px;
}
.field span { display: block; color: var(--text-secondary); font-size: 11px; }
.field strong { display: block; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
.order-card,
.driver-card,
.vehicle-card,
.alert-card,
.log-card {
  width: 100%;
  min-height: 126px;
  padding: 12px;
  text-align: left;
  transition: border-color 160ms ease, background 160ms ease, transform 80ms ease;
}
.order-card:hover,
.driver-card:hover,
.vehicle-card:hover,
.alert-card:hover,
.log-card:hover {
  background: var(--surface-glass-hover);
}
.order-card.active,
.driver-card.active,
.vehicle-card.active,
.alert-card.active,
.log-card.active {
  border-color: color-mix(in srgb, var(--accent) 54%, var(--line));
  background: color-mix(in srgb, var(--accent) 9%, var(--surface));
}
.card-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  min-height: 28px;
}
.card-title { display: flex; min-width: 0; align-items: center; gap: 8px; font-weight: 800; }
.card-title span:last-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.status-icon {
  display: grid;
  width: 24px;
  height: 24px;
  flex: 0 0 auto;
  place-items: center;
  border-radius: 999px;
  background: color-mix(in srgb, var(--accent) 12%, var(--surface));
  color: var(--accent-ink);
  font-size: 12px;
  font-weight: 900;
}
.status-icon.pickup { background: color-mix(in srgb, var(--warning) 16%, var(--surface)); }
.status-icon.return { background: color-mix(in srgb, var(--info) 14%, var(--surface)); }
.status-icon.done { background: color-mix(in srgb, var(--success) 14%, var(--surface)); }
.pill {
  display: inline-flex;
  height: 24px;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  padding: 0 9px;
  background: color-mix(in srgb, var(--ink) 7%, var(--surface));
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
}
.pill.gray { color: var(--text-tertiary); background: color-mix(in srgb, var(--ink) 6%, var(--surface)); }
.pill.danger { color: color-mix(in srgb, var(--danger) 80%, var(--ink)); background: color-mix(in srgb, var(--danger) 12%, var(--surface)); }
.pill.success { color: color-mix(in srgb, var(--success) 80%, var(--ink)); background: color-mix(in srgb, var(--success) 12%, var(--surface)); }
.pill.warn { color: color-mix(in srgb, var(--warning) 70%, var(--ink)); background: color-mix(in srgb, var(--warning) 15%, var(--surface)); }
.card-meta {
  display: grid;
  gap: 6px;
  margin-top: 10px;
  min-height: 52px;
  color: var(--text-secondary);
  font-size: 12px;
  line-height: 1.35;
}
.card-meta span {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.order-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 10px; }
.action-button,
.ghost-button,
.danger-button {
  display: inline-flex;
  height: var(--card-action-h);
  min-width: 64px;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border-radius: var(--radius-sm);
  padding: 0 11px;
  font-size: 12px;
  font-weight: 800;
}
.action-button {
  background: var(--primary);
  color: var(--accent-ink);
}
.ghost-button {
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--text-primary);
}
.danger-button {
  background: color-mix(in srgb, var(--danger) 13%, var(--surface));
  color: color-mix(in srgb, var(--danger) 82%, var(--ink));
}
.pager {
  display: flex;
  width: var(--work-panel-w);
  height: 48px;
  min-height: 48px;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 6px 14px 10px;
  border-top: 1px solid color-mix(in srgb, var(--line) 72%, transparent);
  background: var(--panel);
  color: var(--text-secondary);
  font-size: 12px;
}
.pager select { width: 92px; }
.work-orders {
  margin-top: 10px;
  border-top: 1px solid var(--line);
  padding-top: 10px;
}
.work-orders .field-grid { grid-template-columns: repeat(2, 1fr); margin-top: 0; }
.map-screen {
  position: relative;
  display: grid;
  grid-template-rows: var(--right-head-h) minmax(0, 1fr) var(--map-dock-h);
  min-width: 0;
  min-height: 0;
  width: 100%;
  height: var(--design-h);
  max-height: var(--design-h);
  overflow: hidden;
  background: var(--bg);
}
.map-screen.is-info-view {
  grid-template-rows: var(--right-head-h) minmax(0, 1fr);
}
.map-screen.is-info-view .map-wrap,
.map-screen.is-info-view .bottom-dock {
  display: none;
}
.map-screen:not(.is-info-view) .info-workspace {
  display: none;
}
.map-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  height: var(--right-head-h);
  min-height: var(--right-head-h);
  max-height: var(--right-head-h);
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
  background: color-mix(in srgb, var(--surface) 78%, var(--bg));
}
.top-title { display: grid; gap: 4px; }
.top-title strong { font-size: 17px; }
.top-title span {
  display: block;
  max-width: 44ch;
  overflow: hidden;
  color: var(--text-secondary);
  font-size: 12px;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.map-topbar .field-grid {
  width: 520px;
  max-width: 520px;
  height: 52px;
  margin: 0;
  grid-template-columns: repeat(3, 1fr);
}
.map-wrap {
  position: relative;
  min-height: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
}
canvas#map {
  display: block;
  width: 100%;
  height: 100%;
}
.map-actions {
  position: absolute;
  right: 18px;
  top: 18px;
  display: flex;
  gap: 8px;
  z-index: 5;
}
.map-action {
  height: 34px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface-glass);
  color: var(--text-primary);
  padding: 0 12px;
  font-size: 12px;
  font-weight: 800;
  backdrop-filter: blur(10px);
}
.map-legend {
  position: absolute;
  left: 18px;
  bottom: 18px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  background: var(--surface-glass);
  padding: 9px;
  backdrop-filter: blur(10px);
}
.legend-item {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text-secondary);
  font-size: 12px;
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 999px;
}
.info-window {
  position: absolute;
  z-index: 10;
  width: 310px;
  border: 1px solid color-mix(in srgb, var(--accent) 34%, var(--line));
  border-radius: var(--radius-md);
  background: var(--surface);
  box-shadow: var(--shadow-modal);
  padding: 12px;
}
.info-window h4 {
  margin: 0 0 10px;
  font-size: 14px;
}
.info-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 6px 0;
  border-top: 1px solid var(--line);
  color: var(--text-secondary);
  font-size: 12px;
}
.info-row strong {
  color: var(--text-primary);
  text-align: right;
}
.info-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
.info-workspace {
  min-height: 0;
  height: calc(var(--design-h) - var(--right-head-h));
  max-height: calc(var(--design-h) - var(--right-head-h));
  overflow: auto;
  padding: 16px;
  scrollbar-gutter: stable;
}
.workspace-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);

function updateViewportScale() {
  const styles = getComputedStyle(document.documentElement);
  const frameW = window.innerWidth || document.documentElement.clientWidth || 1488;
  const frameH = window.innerHeight || document.documentElement.clientHeight || 1000;
  const railW = parseFloat(styles.getPropertyValue("--rail-w")) || 72;
  const workPanelW = parseFloat(styles.getPropertyValue("--work-panel-w")) || 420;
  const minRightPanelW = 900;
  const designH = 1000;
  const designW = Math.max(Math.round(designH * (frameW / frameH)), railW + workPanelW + minRightPanelW);
  document.documentElement.style.setProperty("--design-w", `${designW}px`);
  document.documentElement.style.setProperty("--design-h", `${designH}px`);
  document.documentElement.style.setProperty("--right-panel-min-w", `${designW - railW - workPanelW}px`);
  appScale = Math.min(frameW / designW, frameH / designH);
  document.documentElement.style.setProperty("--app-scale", appScale.toFixed(5));
}

function css(name) {

function getOrder(id) { return orders.find(item => item.id === id); }
function getDriver(id) { return drivers.find(item => item.id === id); }
function getVehicle(id) { return vehicles.find(item => item.id === id); }
function getStore(id) { return stores.find(item => item.id === id); }
function getAlert(id) { return alerts.find(item => item.id === id); }
function activeOrder() {
  if (state.selectedKind === "orders") return getOrder(state.selectedId);
  if (state.selectedKind === "drivers") return orders.find(item => item.driverId === state.selectedId) || getOrder(state.selectedId);
  if (state.selectedKind === "vehicles") return orders.find(item => "VEH-" + item.plate.replace("·", "") === state.selectedId) || getOrder(state.selectedId);
  if (state.selectedKind === "alerts") {
    const alert = getAlert(state.selectedId);
    return alert && alert.refKind === "orders" ? getOrder(alert.refId) : getOrder("D3832");
  }
  return getOrder("D3832");
}

function matchesText(value) {
  const text = state.search.trim().toLowerCase();
  if (!text) return true;
  return value.toLowerCase().includes(text);
}

function orderPoolOrders() {
  return orders.filter(order => order.status !== "已完成");
}

function filteredOrders() {
  return orderPoolOrders().filter(order => {
    const base = [
      order.id,
      order.plate,
      order.store,
      order.driver || "",
      order.from,
      order.to,
      order.pickupAddress,
      order.returnAddress
    ].join(" ");
    const byFilter =
      state.searchFilter === "all" ||
      (state.searchFilter === "orders" && matchesText(order.id + " " + order.type)) ||
      (state.searchFilter === "drivers" && matchesText(order.driver || "")) ||
      (state.searchFilter === "plates" && matchesText(order.plate)) ||
      (state.searchFilter === "stores" && matchesText(order.store));
    const timeMatch = state.timeWindow === "all" || order.windowHours <= Number(state.timeWindow);
    const statusMatch = state.statusFilter === "all" || order.status === state.statusFilter;
    return statusMatch && timeMatch && byFilter && matchesText(base);
  });
}

function statusSymbol(status) {

  if (status === "待还车") return "还";

function driverEstimateLabel(driver, work) {
  const order = driver.currentOrderId ? getOrder(driver.currentOrderId) : null;
  if (order) return order.end;
  const nextTime = String(work.next || "").match(/\d{1,2}:\d{2}/);
  if (nextTime) return nextTime[0];
  if (driver.eta !== 999) return `${driver.eta}m`;
  return driver.status === "OFFLINE" ? "待同步" : "待恢复";
}

function renderDriverTimelineRow(driver) {
  const work = driverWorkOrders[driver.id] || { prev: "无", current: "无", next: "待同步" };
  const inactive = ["OFFLINE", "UNAVAILABLE"].includes(driver.status);
  const selected = state.selectedId === driver.id || state.selectedDriverId === driver.id;

  return `

function candidatePriority(driver) {
  const map = { S1: 1, S2: 2, S3: 3, S4: 4, OFFLINE: 99, UNAVAILABLE: 99 };
  return map[driver.status] || 9;
}

function runDispatchPreview(orderId) {
  const order = getOrder(orderId) || activeOrder();
  return drivers
    .filter(driver => !["OFFLINE", "UNAVAILABLE"].includes(driver.status))
    .map(driver => ({
      driver,
      eta: driver.eta + Math.round(Math.hypot(order.lat - driver.lat, order.lng - driver.lng) * 80),
      priority: candidatePriority(driver),
      loadPenalty: driver.load * 8
    }))
    .sort((a, b) => (a.priority * 100 + a.eta + a.loadPenalty) - (b.priority * 100 + b.eta + b.loadPenalty))
    .slice(0, 3);
}

function renderRecommendations() {
  const order = activeOrder() || orders[0];
  const candidates = runDispatchPreview(order.id);
  const best = candidates[0];
  const outcome = !best ? ["PENDING", "NO_DRIVER"] : best.eta >= 120 ? ["MANUAL", "ETA_EXCEEDED"] : ["DISPATCHED", ""];
  recommendPanel.innerHTML = `
    <div class="detail-head">
      <div class="detail-title">推荐派单 Top N</div>
      <span class="pill ${outcome[0] === "DISPATCHED" ? "success" : "warn"}">${outcome[0]}${outcome[1] ? " / " + outcome[1] : ""}</span>
    </div>
    <div class="recommend-list">

          <div class="candidate-row"><span>ETA</span><b>${item.eta}m</b></div>

          <div class="candidate-row"><span>状态</span><b>${item.driver.statusText}</b></div>
        </button>`).join("")}
    </div>`;
}

function resizeMap() {
  const dpr = window.devicePixelRatio || 1;
  mapW = mapArea.clientWidth;
  mapH = mapArea.clientHeight;
  canvas.width = Math.max(1, Math.floor(mapW * dpr));
  canvas.height = Math.max(1, Math.floor(mapH * dpr));
  canvas.style.width = mapW + "px";
  canvas.style.height = mapH + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function toScreen(lat, lng) {
  const pad = Math.min(72, Math.max(38, mapW * 0.06));
  return {
    x: pad + lng * (mapW - pad * 2),
    y: pad + lat * (mapH - pad * 2)
  };
}

function markerFocus(kind, id) {
  if (state.selectedKind === kind && state.selectedId === id) return "selected";
  if (state.activeObject === kind) return "category";
  if (state.selectedKind && state.selectedKind !== kind) return "dim";
  return "normal";
}

function alphaFor(focus) {
  if (focus === "dim") return 0.42;
  if (focus === "category") return 0.86;
  return 1;
}

function markerScale(focus) {
  if (focus === "selected") return 1.22;
  if (focus === "category") return 1.08;
  return 1;
}

function drawDrop(x, y, size, color, focus) {
  ctx.save();
  ctx.globalAlpha = alphaFor(focus);
  ctx.translate(x, y);
  ctx.scale(markerScale(focus), markerScale(focus));
  ctx.fillStyle = color;
  ctx.strokeStyle = css("--surface");
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, size);
  ctx.bezierCurveTo(-size * 1.1, -size * 0.1, -size * 0.62, -size, 0, -size);
  ctx.bezierCurveTo(size * 0.62, -size, size * 1.1, -size * 0.1, 0, size);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = "#fff";
  ctx.font = "800 11px " + css("--font-system");
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("单", 0, -2);
  ctx.restore();
}

function drawCar(x, y, size, color, focus) {
  ctx.save();
  ctx.globalAlpha = alphaFor(focus);
  ctx.translate(x, y);
  ctx.scale(markerScale(focus), markerScale(focus));
  ctx.fillStyle = color;
  ctx.strokeStyle = css("--surface");
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.roundRect(-size * 1.2, -size * 0.4, size * 2.4, size * 1.1, 5);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = "#fff";
  ctx.fillRect(-size * 0.55, -size * 0.82, size * 1.1, size * 0.42);
  ctx.fillStyle = css("--ink");
  ctx.beginPath();
  ctx.arc(-size * 0.65, size * 0.72, 3, 0, Math.PI * 2);
  ctx.arc(size * 0.65, size * 0.72, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawHouse(x, y, size, color, focus) {
  ctx.save();
  ctx.globalAlpha = alphaFor(focus);
  ctx.translate(x, y);
  ctx.scale(markerScale(focus), markerScale(focus));
  ctx.fillStyle = color;
  ctx.strokeStyle = css("--surface");
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, -size);
  ctx.lineTo(size, -size * 0.1);
  ctx.lineTo(size * 0.78, -size * 0.1);
  ctx.lineTo(size * 0.78, size);
  ctx.lineTo(-size * 0.78, size);
  ctx.lineTo(-size * 0.78, -size * 0.1);
  ctx.lineTo(-size, -size * 0.1);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = "#fff";
  ctx.fillRect(-3, size * 0.25, 6, size * 0.55);
  ctx.restore();
}

function drawWheel(x, y, size, color, focus) {
  ctx.save();
  ctx.globalAlpha = alphaFor(focus);
  ctx.translate(x, y);
  ctx.scale(markerScale(focus), markerScale(focus));
  ctx.strokeStyle = color;
  ctx.fillStyle = css("--surface");
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(0, 0, size, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, -size + 4);
  ctx.moveTo(0, 0);
  ctx.lineTo(-size + 4, size * 0.45);
  ctx.moveTo(0, 0);
  ctx.lineTo(size - 4, size * 0.45);
  ctx.stroke();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(0, 0, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawAlert(x, y, size, color, focus) {
  ctx.save();
  ctx.globalAlpha = alphaFor(focus);
  ctx.translate(x, y);
  ctx.scale(markerScale(focus), markerScale(focus));
  ctx.fillStyle = color;
  ctx.strokeStyle = css("--surface");
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, -size);
  ctx.lineTo(size, size);
  ctx.lineTo(-size, size);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = "#fff";
  ctx.font = "900 14px " + css("--font-system");
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("!", 0, size * 0.2);
  ctx.restore();
}

function drawRoute(order) {
  if (!order) return;
  const a = toScreen(order.lat, order.lng);
  const b = toScreen(order.routeTo.lat, order.routeTo.lng);
  ctx.save();
  ctx.strokeStyle = css("--accent");
  ctx.lineWidth = 4;
  ctx.setLineDash([7, 7]);
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.quadraticCurveTo((a.x + b.x) / 2, Math.min(a.y, b.y) - 56, b.x, b.y);
  ctx.stroke();
  ctx.restore();
}

function drawMap() {
  ctx.clearRect(0, 0, mapW, mapH);
  ctx.fillStyle = css("--map");
  ctx.fillRect(0, 0, mapW, mapH);
  ctx.strokeStyle = css("--road");
  ctx.lineWidth = 2;
  [
    [[0.05, 0.26], [0.38, 0.38], [0.90, 0.30]],
    [[0.12, 0.70], [0.45, 0.55], [0.86, 0.76]],
    [[0.30, 0.10], [0.42, 0.40], [0.54, 0.86]],
    [[0.68, 0.12], [0.56, 0.46], [0.28, 0.82]]
  ].forEach(road => {
    ctx.beginPath();
    road.forEach(([lat, lng], index) => {
      const p = toScreen(lat, lng);
      if (index === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });
    ctx.stroke();
  });
  ctx.fillStyle = "rgba(255,255,255,0.28)";
  for (let y = 0.16; y < 0.90; y += 0.18) {
    for (let x = 0.12; x < 0.90; x += 0.18) {
      const p = toScreen(y, x);
      ctx.fillRect(p.x, p.y, 34, 22);
    }
  }
  drawRoute(activeOrder());
  stores.forEach(store => {
    const p = toScreen(store.lat, store.lng);
    drawHouse(p.x, p.y, 14, css("--accent"), markerFocus("stores", store.id));
  });
  orders.forEach(order => {
    const p = toScreen(order.lat, order.lng);
    drawDrop(p.x, p.y, 15, order.status === "已完成" ? css("--success") : css("--warning"), markerFocus("orders", order.id));
  });
  vehicles.forEach(vehicle => {
    const p = toScreen(vehicle.lat, vehicle.lng);
    drawCar(p.x, p.y, 12, vehicle.dispatchable ? css("--info") : css("--muted-line"), markerFocus("vehicles", vehicle.id));
  });
  drivers.forEach(driver => {
    const p = toScreen(driver.lat, driver.lng);
    const gray = driver.status === "OFFLINE" || driver.status === "UNAVAILABLE";
    drawWheel(p.x, p.y, 13, gray ? css("--muted-line") : css("--success"), markerFocus("drivers", driver.id));
  });
  alerts.forEach(alert => {
    const ref = alert.refKind === "orders" ? getOrder(alert.refId) : getVehicle(alert.refId);
    if (!ref) return;
    const p = toScreen(ref.lat - 0.035, ref.lng + 0.026);
    drawAlert(p.x, p.y, 11, css("--danger"), markerFocus("alerts", alert.id));
  });
  requestAnimationFrame(drawMap);
}

function findPoint(kind, id) {
  if (kind === "orders") return getOrder(id);
  if (kind === "drivers") return getDriver(id);
  if (kind === "vehicles") return getVehicle(id);
  if (kind === "stores") return getStore(id);
  if (kind === "alerts") {
    const alert = getAlert(id);
    if (!alert) return null;
    return alert.refKind === "orders" ? getOrder(alert.refId) : getVehicle(alert.refId);
  }
  return null;
}

function showInfo(kind, id) {
  closeInfo();
  const item = findPoint(kind, id);
  if (!item) return;
  const p = toScreen(item.lat, item.lng);
  infoEl = document.createElement("div");
  infoEl.className = "info-window";
  infoEl.style.left = Math.min(Math.max(12, p.x + 18), mapW - 330) + "px";
  infoEl.style.top = Math.min(Math.max(76, p.y - 82), mapH - 260) + "px";
  if (kind === "orders") {
    infoEl.innerHTML = `
      <h4>${item.id} · ${item.plate}</h4>
      <div class="info-row"><span>路线</span><strong>${item.from} -> ${item.to}</strong></div>
      <div class="info-row"><span>状态</span><strong>${item.status}</strong></div>
      <div class="info-row"><span>司机</span><strong>${item.driver || "未分配"}</strong></div>
      <div class="info-row"><span>进展</span><strong>${item.progress}</strong></div>
      <div class="info-actions"><button class="ghost-button" onclick="showRelatedLogs('${item.id}')">日志</button><button class="action-button" onclick="openAssign('${item.id}')">${item.driver ? "司机" : "派单"}</button></div>`;
  } else if (kind === "drivers") {
    infoEl.innerHTML = `
      <h4>${item.name} · ${item.statusText}</h4>
      <div class="info-row"><span>车辆</span><strong>${item.vehicleId.replace("VEH-", "")}</strong></div>
      <div class="info-row"><span>门店</span><strong>${item.store}</strong></div>
      <div class="info-row"><span>ETA</span><strong>${item.eta === 999 ? "--" : item.eta + "m"}</strong></div>
      <div class="info-actions"><button class="ghost-button" onclick="setActiveView('drivers')">司机管理</button></div>`;
  } else if (kind === "vehicles") {
    infoEl.innerHTML = `
      <h4>${item.plate} · ${item.type}</h4>
      <div class="info-row"><span>状态</span><strong>${item.status}</strong></div>
      <div class="info-row"><span>GPS</span><strong>${item.gpsAt}</strong></div>
      <div class="info-row"><span>参与调度</span><strong>${item.dispatchable ? "是" : "否"}</strong></div>
      <div class="info-actions"><button class="ghost-button" onclick="setActiveView('vehicles')">车辆管理</button></div>`;
  } else if (kind === "stores") {
    infoEl.innerHTML = `
      <h4>${item.name}</h4>
      <div class="info-row"><span>区域</span><strong>${item.district}</strong></div>
      <div class="info-row"><span>订单数</span><strong>${orders.filter(order => order.store === item.name).length}</strong></div>
      <div class="info-row"><span>车辆数</span><strong>${vehicles.filter(vehicle => vehicle.store === item.name).length}</strong></div>
      <div class="info-actions"><button class="ghost-button" onclick="setActiveView('orders')">查看订单池</button></div>`;
  } else {
    const alert = getAlert(id);
    infoEl.innerHTML = `
      <h4>${alert.type} · ${alert.target}</h4>
      <div class="info-row"><span>超阈值</span><strong>${alert.exceededMinutes}m</strong></div>
      <div class="info-row"><span>说明</span><strong>${alert.text}</strong></div>
      <div class="info-actions"><button class="danger-button" onclick="manualAlert('${alert.id}')">转人工处理</button></div>`;
  }
  mapArea.appendChild(infoEl);
}

function closeInfo() {
  if (infoEl) infoEl.remove();
  infoEl = null;
}

function pickAt(x, y) {
  const points = [
    ...orders.map(item => ({ kind: "orders", id: item.id, lat: item.lat, lng: item.lng })),
    ...drivers.map(item => ({ kind: "drivers", id: item.id, lat: item.lat, lng: item.lng })),
    ...vehicles.map(item => ({ kind: "vehicles", id: item.id, lat: item.lat, lng: item.lng })),
    ...stores.map(item => ({ kind: "stores", id: item.id, lat: item.lat, lng: item.lng }))
  ];
  let best = null;
  let bestDistance = Infinity;
  points.forEach(item => {
    const p = toScreen(item.lat, item.lng);
    const distance = Math.hypot(x - p.x, y - p.y);
    if (distance < 26 && distance < bestDistance) {
      best = item;
      bestDistance = distance;
    }
  });
  return best;
}

function selectItem(kind, id, openInfo = true) {
  state.selectedKind = kind;
  state.selectedId = id;
  if (["orders", "drivers", "vehicles", "alerts"].includes(kind)) state.activeObject = kind;
  if (kind === "orders") {
    const order = getOrder(id);
    if (order && order.driverId) state.selectedDriverId = order.driverId;
  }
  document.querySelectorAll(".tab").forEach(tab => tab.classList.toggle("active", tab.dataset.object === state.activeObject));
  renderList();
  if (openInfo && kind !== "logs" && state.activeView === "map") showInfo(kind, id);
}

function setActiveView(view) {
  state.activeView = view;
  if (["orders", "drivers", "vehicles", "alerts"].includes(view)) state.activeObject = view;
  document.querySelectorAll(".nav-item").forEach(item => item.classList.toggle("active", item.dataset.view === view));
  document.querySelectorAll(".tab").forEach(tab => tab.classList.toggle("active", tab.dataset.object === state.activeObject));
  renderList();
}

function setActiveObject(kind) {
  state.activeObject = kind;
  if (state.activeView === "map") {
    document.querySelectorAll(".nav-item").forEach(item => item.classList.toggle("active", item.dataset.view === "map"));
    document.querySelectorAll(".tab").forEach(tab => tab.classList.toggle("active", tab.dataset.object === state.activeObject));
    renderList();
    return;
  }
  setActiveView(kind);
}

function showRelatedLogs(orderId) {
  state.activeView = "logs";
  state.activeObject = "orders";
  const log = operationLogs.find(item => item.orderId === orderId);
  if (log) {
    state.selectedKind = "logs";
    state.selectedId = log.id;
  }
  setActiveView("logs");
  showToast(`已按订单 ${orderId} 跳转日志。`, "success");
}

function showRoute(orderId) {
  setActiveView("map");
  selectItem("orders", orderId, true);
  showToast(`已调用 ${API_ENDPOINTS.route}${orderId} mock。`, "success");
}

function openAssign(orderId) {
  const candidates = runDispatchPreview(orderId);
  if (candidates[0]) {
    state.selectedDriverId = candidates[0].driver.id;
    showToast(`已选中推荐司机 ${candidates[0].driver.name}，未提交真实派单。`, "success");
    renderList();
  }
}

function reassignOrder(orderId) {
  const order = getOrder(orderId);
  if (!order) return;
  const candidate = runDispatchPreview(orderId).find(item => item.driver.id !== order.driverId);
  if (!candidate) return;
  const oldDriver = order.driver || "未分配";
  order.driverId = candidate.driver.id;
  order.driver = candidate.driver.name;
  state.selectedDriverId = candidate.driver.id;
  operationLogs.unshift({
    id: "LOG-" + Math.round(900 + Math.random() * 80),
    action: "改派",
    orderId: order.id,
    driverId: candidate.driver.id,
    driverName: candidate.driver.name,
    licensePlate: order.plate,
    operator: "运营管理员",
    traceId: order.traceId,
    result: `由 ${oldDriver} 改派为 ${candidate.driver.name}`,
    timestamp: new Date().toLocaleTimeString("zh-CN", { hour12: false })
  });
  renderList();
  showToast(`已记录改派日志：${oldDriver} -> ${candidate.driver.name}`, "success");
}

function manualAlert(alertId) {
  const alert = getAlert(alertId);
  if (!alert) return;
  operationLogs.unshift({
    id: "LOG-" + Math.round(900 + Math.random() * 80),
    action: "转人工处理",
    orderId: alert.refKind === "orders" ? alert.refId : "-",
    driverId: "-",
    driverName: "-",
    licensePlate: alert.refKind === "vehicles" ? alert.target : "-",
    operator: "运营管理员",
    traceId: "trc-alert-" + alert.id.toLowerCase(),
    result: "仅记录日志，不改变状态机",
    timestamp: new Date().toLocaleTimeString("zh-CN", { hour12: false })
  });
  showToast("已记录转人工处理日志，不改变订单状态。", "warn");
}

function showToast(message, type) {
  const stack = document.getElementById("toast-stack");
  const toast = document.createElement("div");
  toast.className = "toast " + (type || "");
  toast.textContent = message;
  stack.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = "0";
    toast.style.transition = "opacity 180ms ease";
    setTimeout(() => toast.remove(), 220);
  }, 2500);
}

document.querySelectorAll(".nav-item").forEach(button => {
  button.addEventListener("click", () => setActiveView(button.dataset.view));
});
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => setActiveObject(tab.dataset.object));
});
searchInput.addEventListener("input", event => {
  state.search = event.target.value;
  state.page = 1;
  renderList();
});
searchFilter.addEventListener("change", event => {
  state.searchFilter = event.target.value;
  state.page = 1;
  renderList();
});
document.getElementById("time-filter").addEventListener("change", event => {
  state.timeWindow = event.target.value;
  state.page = 1;
  renderList();
});
document.getElementById("status-filter").addEventListener("change", event => {
  state.statusFilter = event.target.value;
  state.page = 1;
  renderList();
});
function handleSelectableClick(event) {
  const card = event.target.closest("[data-kind][data-id]");
  if (card) selectItem(card.dataset.kind, card.dataset.id, true);
}

infoWorkspace.addEventListener("input", event => {
  if (event.target.id !== "vehicle-detail-search") return;
  state.vehicleDetailSearch = event.target.value;
  const body = document.getElementById("vehicle-detail-body");
  if (body) body.innerHTML = renderVehicleDetailRows();
});

listEl.addEventListener("click", event => {
  const action = event.target.closest("[data-action]");
  if (action) {
    event.stopPropagation();
    const orderId = action.dataset.order;
    const alertId = action.dataset.alert;
    if (action.dataset.action === "log") showRelatedLogs(orderId);
    if (action.dataset.action === "assign") openAssign(orderId);
    if (action.dataset.action === "locate-alert") {
      setActiveView("map");
      selectItem("alerts", alertId, true);
    }
    if (action.dataset.action === "manual-alert") manualAlert(alertId);
    return;
  }
  handleSelectableClick(event);
});
infoWorkspace.addEventListener("click", handleSelectableClick);
recommendPanel.addEventListener("click", event => {
  const candidate = event.target.closest("[data-candidate]");
  if (!candidate) return;
  state.selectedDriverId = candidate.dataset.candidate;
  renderRecommendations();
  showToast(`已选中司机 ${getDriver(state.selectedDriverId).name}，推荐结果自动更新。`, "success");
});
document.getElementById("refresh-points").addEventListener("click", () => {
  state.flash += 1;
  document.getElementById("map-caption").textContent = `点位已刷新，最近同步 ${new Date().toLocaleTimeString("zh-CN", { hour12: false })}`;
  showToast(`已调用 ${API_ENDPOINTS.map} mock 刷新点位。`, "success");
});
canvas.addEventListener("click", event => {
  const rect = canvas.getBoundingClientRect();
  const x = (event.clientX - rect.left) / appScale;
  const y = (event.clientY - rect.top) / appScale;
  const item = pickAt(x, y);
  if (item) selectItem(item.kind, item.id, true);
  else closeInfo();
});
window.addEventListener("resize", () => {
  updateViewportScale();
  resizeMap();
});

updateViewportScale();
resizeMap();
renderList();
requestAnimationFrame(drawMap);
</script>
</body>
</html>
